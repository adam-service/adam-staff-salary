}
function saveEditClient(id){
  const c=D.clients.find(x=>x.id===id);if(!c)return;
  c.name=document.getElementById('eName').value.trim();
  // 不正防止：サービス区分・流入経路・プランは管理者のみ変更可
  if(isMaster){
    c.service=_modalSvc;
    c.source=SERVICES[_modalSvc].hasSource?_modalSrc:null;
    c.plan=SERVICES[_modalSvc].hasPlan?(_modalPlan||'basic'):'basic';
  }
  // スタッフは c.service / c.source を維持（既存値）
  if(isMaster&&_modalStaffId)c.staffId=_modalStaffId;
  // カスタム単価・報酬（管理者のみ）
  if(isMaster){
    const cb=document.getElementById('eCustomEnabled');
    if(cb&&cb.checked){
      c.customEnabled=true;
      c.customSessionPrice=parseInt(document.getElementById('eCustomPrice').value)||0;
      c.customReward=parseInt(document.getElementById('eCustomReward').value)||0;
    }else{
      c.customEnabled=false;
    }
  }
  const isRoom=c.service==='aden'||c.service==='sub-svc';
  const isSelfVar=(c.service==='noic'||c.service==='resync')&&c.source==='self';
  const isAdNoicResync=(c.service==='noic'||c.service==='resync')&&c.source==='ad';
  const hasPriceInput=isRoom||isSelfVar||(isMaster&&isAdNoicResync);
  if(c.customEnabled){
    c.sessionPrice=c.customSessionPrice||0;
  }else if(hasPriceInput){
    if(isMaster){
      const inp=document.getElementById('ePrice');
      c.sessionPrice=inp?(parseInt(inp.value)||SERVICES[c.service].defaultPrice):SERVICES[c.service].defaultPrice;
    }
    // スタッフは sessionPrice を変更しない（既存値を維持）
  }else{
    c.sessionPrice=SERVICES[c.service].defaultPrice;
  }
  const newTicket=parseInt(document.getElementById('eNewTicket').value)||0;
  if(newTicket>0){
    // インライン追加時は client.sessionPrice + client.plan を継承
    const unitPrice=c.sessionPrice||SERVICES[c.service]?.defaultPrice||18000;
    c.courses.push({id:'tk_'+Date.now(),total:newTicket,addedAt:Date.now(),unitPrice,plan:c.plan||'basic'});
  }
  save();closeModal();render();
}
function deleteClient(id){
  if(!isMaster){alert('ゲストの削除は管理者のみ可能です');return}
  if(!confirm('このゲストを削除しますか？\nセッションデータも削除されます。'))return;
  D.clients=D.clients.filter(x=>x.id!==id);
  Object.keys(D.sessions).forEach(mk=>{if(D.sessions[mk][id])delete D.sessions[mk][id]});
  save();closeModal();render();
}

/* ===== Export/Import ===== */
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='adam_staff_salary_backup_'+currentMonth+'.json';a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const imported=JSON.parse(ev.target.result);
      if(!imported.config||!imported.clients){alert('無効なデータです');return}
      if(!confirm('現在のデータを上書きしますか？'))return;
      D=imported;migrateData(D);save();render();alert('インポートしました');
    }catch(err){alert('ファイルの読み込みに失敗しました')}
  };
  reader.readAsText(f);e.target.value='';
}

/* ===== Modal ===== */
function openModal(html){
  document.getElementById('modalContent').innerHTML=html;
  const ov=document.getElementById('modalOverlay');
  ov.classList.add('show');
  // 背景クリックでは閉じない（入力途中の誤操作防止）。閉じるのは右上×のみ
  ov.onmousedown=null;
}
function closeModal(){
  const ov=document.getElementById('modalOverlay');
  ov.classList.remove('show');
  ov.onmousedown=null;
}

/* ===== Tab ===== */
function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  const tabMap={input:'tabInput',report:'tabReport',clients:'tabClients',settings:'tabSettingsContent'};
  document.getElementById(tabMap[tab]).classList.add('active');
  const btns=document.querySelectorAll('.tabs button');
  const idx={input:0,report:1,clients:2,settings:3}[tab];
  if(btns[idx])btns[idx].classList.add('active');
  render();
}

/* ===== Util ===== */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ===== Init ===== */
function initApp(){
  let label='スタッフ';
  if(isMaster)label='管理者モード';
  else if(currentStaffId){const s=findStaff(currentStaffId);if(s)label=s.name}
  document.getElementById('headerSubtitle').textContent=label;
  document.getElementById('tabSettings').classList.toggle('hidden',!isMaster);
  clientFilter='all';
  render();
}
load();
currentMonth=monthKey(new Date());
document.getElementById('monthLabel').textContent=monthDisplay(currentMonth);
renderStaffSelector();

(async function boot(){
  if(API_URL){
    const data=await fetchFromCloud();
    if(data){
      migrateData(data);
      const cloudHasClients=data.clients&&data.clients.length>0;
      const localHasClients=D.clients&&D.clients.length>0;
      if(cloudHasClients){
        // クラウドにスタッフが無くローカルにいる場合はローカルを維持
        if((!data.config.staff||data.config.staff.length===0)&&D.config.staff&&D.config.staff.length>0){
          data.config.staff=D.config.staff;
        }
        // 報酬調整データもクラウドが空ならローカル保持
        if(!data.adjustments||Object.keys(data.adjustments).length===0){
          if(D.adjustments&&Object.keys(D.adjustments).length>0)data.adjustments=D.adjustments;
        }else if(D.adjustments){
          // 両方ある場合はマージ（ローカルにあってクラウドに無いものを追加）
          Object.keys(D.adjustments).forEach(mk=>{
            if(!data.adjustments[mk])data.adjustments[mk]={};
            Object.keys(D.adjustments[mk]).forEach(sk=>{
              if(!data.adjustments[mk][sk])data.adjustments[mk][sk]=D.adjustments[mk][sk];
            });
          });
        }
        // ローカルにあってクラウドに無いゲスト・セッションをマージ（未送信の変更を保護）
        const cloudClientIds=new Set(data.clients.map(c=>c.id));
        (D.clients||[]).forEach(c=>{if(!cloudClientIds.has(c.id))data.clients.push(c)});
        Object.keys(D.sessions||{}).forEach(mk=>{
          if(!data.sessions[mk])data.sessions[mk]={};
          Object.keys(D.sessions[mk]).forEach(cid=>{
            if(!data.sessions[mk][cid])data.sessions[mk][cid]=D.sessions[mk][cid];
          });
        });
        // 確定スナップショット：クラウドを正とし、ローカル限定の凍結値だけ保護的にマージ
        mergeSnapshotsInto(data.lockedSnapshots,D.lockedSnapshots);
        // ローカルに未送信のデータがあった場合はクラウドへ送信
        const hadUnsentLocal=(D.clients||[]).some(c=>!cloudClientIds.has(c.id));
        D=data;
        // クラウドの最新コースを取得した後で、確定月の未凍結分を正しい単価で凍結（一度だけ）
        const backfilled=backfillLockedSnapshots();
        saveLocal();
        if((hadUnsentLocal||backfilled)&&API_URL)saveToCloud();
      }else if(localHasClients){
        console.log('Cloud is empty but local has data — pushing local to cloud');
        saveToCloud();
      }else{
        if((!data.config.staff||data.config.staff.length===0)&&D.config.staff&&D.config.staff.length>0){
          data.config.staff=D.config.staff;
        }
        D=data;saveLocal();
      }
    }
    // クラウド取得後、ロック画面のスタッフ選択を最新データで再描画
    window.__bootDone=true;
    if(document.getElementById('lockScreen') && !document.getElementById('lockScreen').classList.contains('hidden')){
      renderStaffSelector();
    }
  }else{
    // API_URLは常にデフォルトが入るのでここには来ない想定。念のためフォールバック。
    window.__bootDone=true;
    API_URL=DEFAULT_API_URL;
    localStorage.setItem(API_URL_KEY,API_URL);
    location.reload();
  }
})();

/* ===== 自動同期（30秒ごとにクラウド最新を取得して再描画） ===== */
let _autoSyncTimer=null;
async function autoSyncTick(){
  if(!API_URL)return;
  // ローカルで最近編集した／クラウド送信中はスキップ（ローカルの変更がクラウド側に反映されてからフェッチする）
  if(saveTimer)return;
  if(Date.now()-_lastLocalSaveAt<10000)return;
  // モーダル（編集中）の間も同期しない
  if(document.querySelector('.modal-overlay.show'))return;
  try{
    const data=await fetchFromCloud();
    if(!data)return;
    migrateData(data);
    // ローカル優先：ローカルに有るがクラウドに無いスタッフ／ゲスト／チケット／調整を保護
    if((!data.config.staff||data.config.staff.length===0)&&D.config.staff&&D.config.staff.length>0){
      data.config.staff=D.config.staff;
    }
    // 報酬調整データのマージ（ローカル優先）
    if(!data.adjustments)data.adjustments={};
    if(D.adjustments){
      Object.keys(D.adjustments).forEach(mk=>{
        if(!data.adjustments[mk])data.adjustments[mk]={};
        Object.keys(D.adjustments[mk]).forEach(sk=>{
          if(!data.adjustments[mk][sk])data.adjustments[mk][sk]=D.adjustments[mk][sk];
        });
      });
    }
    // ローカルにあってクラウドに無いゲストはマージ（ローカル優先）
    const cloudClientIds=new Set((data.clients||[]).map(c=>c.id));
    (D.clients||[]).forEach(c=>{
      if(!cloudClientIds.has(c.id))data.clients.push(c);
    });
    // ローカルにあってクラウドに無いセッション数もマージ
    Object.keys(D.sessions||{}).forEach(mk=>{
      if(!data.sessions[mk])data.sessions[mk]={};
      Object.keys(D.sessions[mk]).forEach(cid=>{
        if(!data.sessions[mk][cid])data.sessions[mk][cid]=D.sessions[mk][cid];
      });
    });
    // 確定スナップショット：クラウドを正とし、ローカル限定の凍結値だけ保護的にマージ
    mergeSnapshotsInto(data.lockedSnapshots,D.lockedSnapshots);
    const lockOpen=document.getElementById('lockScreen') && !document.getElementById('lockScreen').classList.contains('hidden');
    if(lockOpen){
      D=data;backfillLockedSnapshots();saveLocal();renderStaffSelector();
    }else{
      D=data;
      const bf=backfillLockedSnapshots();
      saveLocal();
      if(bf&&API_URL)saveToCloud();
      if(currentStaffId&&!findStaff(currentStaffId)){
        alert('スタッフ情報が更新されました。再ログインしてください。');
        logout();return;
      }
      render();
    }
  }catch(e){console.warn('autoSync failed',e)}
}
function startAutoSync(){
  if(_autoSyncTimer)clearInterval(_autoSyncTimer);
  _autoSyncTimer=setInterval(autoSyncTick,60000);
}
startAutoSync();
</script>
