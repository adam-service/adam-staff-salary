<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ADAM スタッフ報酬管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a1a1a;--primary-light:#2c2c2c;--primary-dark:#000;
  --accent:#2D7D5F;--accent-light:#3a9472;
  --aden:#2B5797;--aden-light:#3a6db5;
  --sub:#5d6c7d;--sub-light:#7588a0;
  --noic:#27864a;--noic-light:#34a85c;
  --resync:#E8913A;--resync-light:#f0a85c;
  --green:#27864a;--green-light:#34a85c;
  --red:#c0392b;--red-light:#e74c3c;
  --bg:#f0f2f5;--card:#fff;--text:#2c3e50;--text-light:#7f8c8d;
  --border:#e0e3e8;--shadow:0 2px 8px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',Meiryo,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;overflow-x:hidden;touch-action:manipulation}
button,a,input,select,textarea,.svc-radio,.source-radio,.staff-selector button,.role-switch button{touch-action:manipulation}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:14px 16px 10px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header h1{font-size:15px;font-weight:600;opacity:.9;letter-spacing:.5px}
.header .subtitle{font-size:12px;opacity:.7;margin-top:2px}
.month-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:10px}
.month-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-nav button:active{background:rgba(255,255,255,.35)}
.month-nav .month-label{font-size:18px;font-weight:700;min-width:140px;text-align:center}
.tabs{position:sticky;top:78px;z-index:99;display:flex;background:#fff;border-bottom:2px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.tabs button{flex:1;padding:12px 4px;border:none;background:none;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;position:relative;transition:.2s}
.tabs button.active{color:var(--accent)}
.tabs button.active::after{content:'';position:absolute;bottom:-2px;left:10%;width:80%;height:3px;background:var(--accent);border-radius:2px}
.main{max-width:680px;margin:0 auto;padding:12px 12px 100px}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.summary-item{background:var(--bg);border-radius:8px;padding:10px;text-align:center;position:relative}
.summary-item .label{font-size:11px;color:var(--text-light);margin-bottom:4px;font-weight:600}
.summary-item .value{font-size:18px;font-weight:800}
.summary-item .sub{font-size:10px;color:var(--text-light);margin-top:2px}
.summary-item .value.positive{color:var(--green)}
.summary-item .value.negative{color:var(--red)}
.summary-item.wide{grid-column:1/-1}
.summary-item.aden{border-left:4px solid var(--aden)}
.summary-item.sub-svc{border-left:4px solid var(--sub)}
.summary-item.noic{border-left:4px solid var(--noic)}
.summary-item.resync{border-left:4px solid var(--resync)}
.summary-item.highlight{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff}
.summary-item.highlight .label{color:rgba(255,255,255,.8)}
.summary-item.highlight .value{color:#fff}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;color:#fff;vertical-align:middle;margin-right:4px}
.badge.aden{background:var(--aden)}
.badge.sub-svc{background:var(--sub)}
.badge.noic{background:var(--noic)}
.badge.resync{background:var(--resync)}
.badge.source-ad{background:#d35400;font-size:9px}
.badge.source-self{background:#16a085;font-size:9px}
.badge.source-monitor{background:#8e44ad;font-size:9px}
.client-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:4px solid var(--border)}
.client-card.aden{border-left-color:var(--aden)}
.client-card.sub-svc{border-left-color:var(--sub)}
.client-card.noic{border-left-color:var(--noic)}
.client-card.resync{border-left-color:var(--resync)}
.client-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.client-name{font-size:15px;font-weight:700}
.client-meta{font-size:11px;color:var(--text-light);margin-bottom:8px;line-height:1.6}
.session-row{display:flex;align-items:center;justify-content:space-between}
.session-controls{display:flex;align-items:center;gap:8px}
.session-controls button{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:#fff;font-size:22px;font-weight:700;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.session-controls button:active:not(:disabled){background:var(--accent);color:#fff;border-color:var(--accent)}
.session-controls button.minus{color:var(--red)}
.session-controls button.minus:active:not(:disabled){background:var(--red);border-color:var(--red)}
.session-controls button:disabled{opacity:.3;cursor:not-allowed}
.session-controls .count{font-size:24px;font-weight:800;min-width:36px;text-align:center}
.session-reward{text-align:right}
.session-reward .amount{font-size:16px;font-weight:700}
.session-reward .amount.positive{color:var(--green)}
.session-reward .unit-price{font-size:11px;color:var(--text-light)}
.price-override{margin-top:8px;padding:8px 10px;background:var(--bg);border-radius:8px;display:flex;align-items:center;gap:8px;font-size:12px}
.price-override label{margin:0;font-size:11px;color:var(--text-light);font-weight:600;white-space:nowrap}
.price-override input{padding:4px 8px;font-size:13px;width:90px;border-radius:6px;text-align:right}
.price-override .reset{background:none;border:none;color:var(--text-light);font-size:11px;cursor:pointer;padding:2px 6px;text-decoration:underline}
.ticket-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 10px;background:var(--bg);border-radius:8px;font-size:12px}
.ticket-bar .ticket-label{color:var(--text-light)}
.ticket-bar .ticket-count{font-weight:800;font-size:14px}
.ticket-bar .ticket-count.zero{color:var(--red)}
.ticket-bar .ticket-add{margin-left:auto;background:var(--accent);color:#fff;border:none;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer}
.ticket-bar .ticket-add:active{opacity:.7}
.ticket-progress{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:0 6px}
.ticket-progress .fill{height:100%;background:var(--green);border-radius:3px;transition:.3s}
.ticket-progress .fill.warn{background:var(--resync)}
.ticket-progress .fill.empty{background:var(--red)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;transition:.15s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-accent{background:var(--resync);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:#fff;color:var(--accent);border:2px solid var(--accent)}
.btn-lock{background:var(--green);color:#fff}
.btn-unlock{background:var(--resync);color:#fff}
.btn+.btn{margin-top:8px}
.btn-sm{padding:8px 16px;font-size:13px;width:auto;display:inline-block}
input,select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:var(--text);-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,125,95,.12)}
label{display:block;font-size:12px;font-weight:600;color:var(--text-light);margin-bottom:4px}
.form-group{margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lock-banner{background:linear-gradient(135deg,var(--green),var(--green-light));color:#fff;padding:12px 16px;border-radius:10px;text-align:center;margin-bottom:12px;font-size:13px;font-weight:600}
.lock-banner .icon{font-size:20px;display:block;margin-bottom:4px}
.report-table{width:100%;border-collapse:collapse;font-size:13px}
.report-table th{background:var(--primary);color:#fff;padding:8px 6px;text-align:center;font-weight:600;font-size:11px}
.report-table td{padding:8px 6px;border-bottom:1px solid var(--border);text-align:center}
.report-table tr:last-child td{border-bottom:none}
.report-table .total-row{background:var(--bg);font-weight:700}
.report-table .name-col{text-align:left;font-weight:600}
.section-title{font-size:13px;font-weight:700;color:var(--text);margin:16px 0 8px;padding:6px 10px;border-radius:6px;background:var(--bg);display:flex;align-items:center;gap:8px}
.section-title.aden{border-left:4px solid var(--aden)}
.section-title.sub-svc{border-left:4px solid var(--sub)}
.section-title.noic{border-left:4px solid var(--noic)}
.section-title.resync{border-left:4px solid var(--resync)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:14px}
.lock-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,var(--primary-dark),var(--primary));display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.lock-screen.hidden{display:none}
.lock-title{font-size:18px;font-weight:700;margin-bottom:8px;letter-spacing:2px}
.lock-subtitle{font-size:13px;opacity:.7;margin-bottom:24px}
.pin-dots{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.5);transition:.2s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-key{width:72px;height:56px;border:none;border-radius:12px;background:rgba(255,255,255,.15);color:#fff;font-size:24px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.pin-key:active{background:rgba(255,255,255,.3)}
.pin-key.del{font-size:14px;font-weight:700}
.pin-key.empty{background:transparent;cursor:default}
.pin-error{color:#ff6b6b;font-size:13px;min-height:20px;margin-top:12px;text-align:center}
.role-switch{margin-top:20px;display:flex;gap:10px}
.role-switch button{padding:8px 20px;border-radius:20px;border:1.5px solid rgba(255,255,255,.4);background:transparent;color:rgba(255,255,255,.7);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.role-switch button.active{background:rgba(255,255,255,.2);border-color:#fff;color:#fff}
.staff-selector{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;min-width:240px;max-width:90%;max-height:300px;overflow-y:auto}
.staff-selector button{padding:14px 20px;border-radius:12px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;text-align:center}
.staff-selector button:active,.staff-selector button:hover{background:rgba(255,255,255,.18);border-color:#fff}
.staff-selector .empty{color:rgba(255,255,255,.5);font-size:13px;padding:14px;text-align:center;border:1.5px dashed rgba(255,255,255,.3);border-radius:12px;cursor:default;background:transparent}
.lock-back{margin-top:16px;background:transparent;border:none;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;padding:6px 12px}
.lock-back:hover{color:#fff}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;transform:translateY(100%);transition:.3s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-header h2{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.delete-zone{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.hidden{display:none!important}
@media(min-width:600px){.pin-pad{gap:12px}.pin-key{width:80px;height:60px}}
.settings-section{margin-bottom:20px}
.settings-section h3{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.info-row:last-child{border-bottom:none}
.info-row .label{color:var(--text-light)}
.info-row .val{font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.course-list{margin-top:8px}
.course-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.course-item:last-child{border-bottom:none}
.course-del{color:var(--red);font-size:18px;cursor:pointer;padding:4px 8px;border:none;background:none}
.sync-status{display:flex;align-items:center;gap:6px;margin-top:4px}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.online{background:#2ecc71}
.sync-dot.syncing{background:#f39c12;animation:pulse .8s infinite}
.sync-dot.offline{background:#95a5a6}
.sync-dot.error{background:#e74c3c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-text{font-size:11px;opacity:.8}
.setup-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.setup-overlay.open{opacity:1;pointer-events:all}
.setup-box{background:#fff;border-radius:16px;padding:28px 24px;max-width:440px;width:90%;color:var(--text)}
.setup-box h2{font-size:18px;margin-bottom:8px;color:var(--accent)}
.setup-box p{font-size:13px;color:var(--text-light);margin-bottom:16px;line-height:1.5}
.setup-box input{margin-bottom:12px}
.setup-box button{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.setup-box button:disabled{opacity:.5}
.setup-error{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;white-space:pre-wrap}
.loading-overlay{position:fixed;inset:0;z-index:9997;background:rgba(255,255,255,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:15px;color:var(--text);opacity:0;pointer-events:none;transition:.2s}
.loading-overlay.show{opacity:1;pointer-events:all}
.filter-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.filter-tab{padding:6px 14px;border:1.5px solid var(--border);border-radius:16px;background:#fff;font-size:12px;font-weight:600;color:var(--text-light);cursor:pointer;white-space:nowrap;transition:.15s}
.filter-tab.active{border-color:var(--accent);background:var(--accent);color:#fff}
.filter-tab.aden.active{background:var(--aden);border-color:var(--aden)}
.filter-tab.sub-svc.active{background:var(--sub);border-color:var(--sub)}
.filter-tab.noic.active{background:var(--noic);border-color:var(--noic)}
.filter-tab.resync.active{background:var(--resync);border-color:var(--resync)}
.svc-radio-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.svc-radio{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
.svc-radio.active{border-width:2px;padding:9px 11px}
.svc-radio.aden.active{border-color:var(--aden);background:rgba(43,87,151,.08);color:var(--aden)}
.svc-radio.sub-svc.active{border-color:var(--sub);background:rgba(93,108,125,.08);color:var(--sub)}
.svc-radio.noic.active{border-color:var(--noic);background:rgba(39,134,74,.08);color:var(--noic)}
.svc-radio.resync.active{border-color:var(--resync);background:rgba(232,145,58,.08);color:var(--resync)}
.svc-radio-dot{width:14px;height:14px;border-radius:50%;border:2px solid currentColor;position:relative;flex-shrink:0}
.svc-radio.active .svc-radio-dot::after{content:'';position:absolute;inset:2px;background:currentColor;border-radius:50%}
.source-radio-group{display:flex;gap:8px}
.source-radio{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;text-align:center;color:var(--text-light);transition:.15s}
.source-radio.active{border-color:var(--accent);background:var(--accent);color:#fff}
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-title">ADAM スタッフ報酬管理</div>
  <div class="lock-subtitle" id="lockRole">スタッフを選択</div>
  <div class="staff-selector" id="staffSelector"></div>
  <div class="pin-dots hidden" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad hidden" id="pinPad">
    <button class="pin-key" onclick="pinInput('1')">1</button>
    <button class="pin-key" onclick="pinInput('2')">2</button>
    <button class="pin-key" onclick="pinInput('3')">3</button>
    <button class="pin-key" onclick="pinInput('4')">4</button>
    <button class="pin-key" onclick="pinInput('5')">5</button>
    <button class="pin-key" onclick="pinInput('6')">6</button>
    <button class="pin-key" onclick="pinInput('7')">7</button>
    <button class="pin-key" onclick="pinInput('8')">8</button>
    <button class="pin-key" onclick="pinInput('9')">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" onclick="pinInput('0')">0</button>
    <button class="pin-key del" onclick="pinDelete()">&#9003;</button>
  </div>
  <div class="pin-error" id="pinError"></div>
  <div class="role-switch">
    <button id="roleStaff" class="active" onclick="switchRole('staff')">スタッフ</button>
    <button id="roleAdmin" onclick="switchRole('admin')">管理者</button>
  </div>
  <button class="lock-back hidden" id="lockBack" onclick="backToStaffSelect()">← スタッフ選択に戻る</button>
</div>

<!-- Header -->
<div class="header" id="appHeader">
  <h1 id="headerTitle">ADAM スタッフ報酬管理</h1>
  <div class="subtitle" id="headerSubtitle">スタッフ</div>
  <div class="sync-status"><span class="sync-dot offline" id="syncDot"></span><span class="sync-text" id="syncText">ローカル</span></div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs" id="tabBar">
  <button class="active" onclick="switchTab('input')">入力</button>
  <button onclick="switchTab('report')">レポート</button>
  <button onclick="switchTab('clients')">ゲスト</button>
  <button id="tabSettings" class="hidden" onclick="switchTab('settings')">設定</button>
</div>

<!-- Main -->
<div class="main">
  <div class="tab-content active" id="tabInput">
    <div id="lockBanner"></div>
    <div class="card" id="summaryCard"></div>
    <div id="filterTabs"></div>
    <div id="clientList"></div>
    <div id="lockButton"></div>
    <button class="btn btn-outline" style="margin-top:12px" onclick="openAddClient()">＋ ゲストを追加</button>
  </div>
  <div class="tab-content" id="tabReport"></div>
  <div class="tab-content" id="tabClients"></div>
  <div class="tab-content" id="tabSettingsContent"></div>
</div>

<!-- API URL Setup -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>クラウド接続 初期設定</h2>
    <p>Google Apps ScriptのウェブアプリURLを入力してください。<br>管理者からURLを受け取ってください。</p>
    <input id="apiUrlInput" placeholder="https://script.google.com/macros/s/xxxx/exec" type="url">
    <button id="apiUrlSaveBtn" onclick="saveApiUrl()">接続テスト＆保存</button>
    <div class="setup-error" id="setupError"></div>
    <div style="margin-top:12px;text-align:center"><a href="#" onclick="document.getElementById('setupOverlay').classList.remove('open');return false" style="font-size:13px;color:var(--text-light)">スキップ（ローカルのみ）</a></div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay"><div>読み込み中...</div></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script>
/* ===== Storage ===== */
const SK='adam_staff_salary_v1';
const API_URL_KEY='adam_staff_api_url';
// 本番のGAS URLをデフォルトに埋め込み。新規端末でもセットアップ不要で即同期される
const DEFAULT_API_URL='https://script.google.com/macros/s/AKfycbwk3TSCevgJCCdGJQLnMd_vzZ-S0kb0-4dOHOdWkh1jmW_S0kqBlI81haMgTgE07oIFkA/exec';
let API_URL=localStorage.getItem(API_URL_KEY)||DEFAULT_API_URL;
if(!localStorage.getItem(API_URL_KEY))localStorage.setItem(API_URL_KEY,API_URL);
let saveTimer=null;
const SAVE_DELAY=1500;

/* ===== Service Definitions ===== */
const SERVICES={
  aden:{label:'ADEN',color:'aden',icon:'A',hasRoom:true,defaultPrice:18000,defaultRoom:8000},
  'sub-svc':{label:'SUB',color:'sub-svc',icon:'S',hasRoom:true,defaultPrice:13000,defaultRoom:5000},
  noic:{label:'NOIC',color:'noic',icon:'N',hasSource:true,hasPlan:true,defaultPrice:18000,defaultRewards:{ad:6000,self:10000,monitor:2500}},
  resync:{label:'resync',color:'resync',icon:'R',hasSource:true,hasPlan:true,defaultPrice:18000,defaultRewards:{ad:6000,self:10000,monitor:2500}}
};
/* Plan定義（NOIC/resyncのみ。Basicが既存・Liteが新規） */
const PLANS={
  basic:{label:'Basic',sessionTime:'50分',defaultPrice:18000,discountPrice:15000,rewards:{ad:6000,self:10000,monitor:2500,ltvAd:8000,ltvSelf:8000}},
  lite:{label:'Lite',sessionTime:'25分',defaultPrice:12000,discountPrice:12000,rewards:{ad:4500,self:6000,monitor:2500,ltvAd:6000,ltvSelf:6000}}
};
/* LTV閾値（432,000円超で広告→自己集客扱いに昇格） */
const LTV_THRESHOLD_DEFAULT=432000;
function svcLabel(s){return SERVICES[s]?SERVICES[s].label:s}
function svcClass(s){return SERVICES[s]?SERVICES[s].color:''}
function sourceLabel(src){return src==='ad'?'広告経由':src==='self'?'自己集客':src==='monitor'?'モニター':''}

/* ===== Default Data ===== */
function defaultData(){
  return{
    config:{
      masterPin:'0000',
      staff:[],
      ltvThreshold:LTV_THRESHOLD_DEFAULT,
      prices:{
        aden:{room:8000},
        'sub-svc':{room:5000},
        noic:{ad:6000,self:10000,monitor:2500,lite:{ad:4500,self:6000,monitor:2500}},
        resync:{ad:6000,self:10000,monitor:2500,lite:{ad:4500,self:6000,monitor:2500}}
      }
    },
    clients:[],
    sessions:{},
    lockedMonths:{},
    /* lockedSnapshots: 確定月の計算結果スナップショット。ロック時点の金額を不変に保つ */
    lockedSnapshots:{}
  };
}
let D,isMaster=false,currentStaffId=null,currentMonth,pinBuffer='',loginRole='staff',loginStaffId=null,clientFilter='all';

function migrateData(d){
  if(!d.config)d.config=defaultData().config;
  if(d.config.masterPin!=null)d.config.masterPin=String(d.config.masterPin).padStart(4,'0');
  if(!d.adjustments)d.adjustments={};
  // 旧 trainerName/trainerPin を staff[0] に移行
  if(!d.config.staff)d.config.staff=[];
  if((d.config.trainerName||d.config.trainerPin)&&d.config.staff.length===0){
    d.config.staff.push({
      id:'s_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
      name:d.config.trainerName||'スタッフ1',
      pin:String(d.config.trainerPin||'0000').padStart(4,'0'),
      createdAt:Date.now()
    });
  }
  delete d.config.trainerName;
  delete d.config.trainerPin;
  // staff の正規化
  d.config.staff.forEach(s=>{
    if(s.pin!=null)s.pin=String(s.pin).padStart(4,'0');
    if(!s.id)s.id='s_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    if(!s.createdAt)s.createdAt=Date.now();
  });
  if(!d.config.prices)d.config.prices=defaultData().config.prices;
  if(!d.config.prices.aden)d.config.prices.aden={room:8000};
  if(!d.config.prices['sub-svc'])d.config.prices['sub-svc']={room:5000};
  if(!d.config.prices.noic)d.config.prices.noic={ad:6000,self:10000,monitor:2500};
  else if(d.config.prices.noic.monitor==null)d.config.prices.noic.monitor=2500;
  if(!d.config.prices.resync)d.config.prices.resync={ad:6000,self:10000,monitor:2500};
  else if(d.config.prices.resync.monitor==null)d.config.prices.resync.monitor=2500;
  // Lite料金（NOIC/resync）の初期化
  if(!d.config.prices.noic.lite)d.config.prices.noic.lite={ad:4500,self:6000,monitor:2500};
  if(!d.config.prices.resync.lite)d.config.prices.resync.lite={ad:4500,self:6000,monitor:2500};
  // LTV閾値の初期化
  if(d.config.ltvThreshold==null)d.config.ltvThreshold=LTV_THRESHOLD_DEFAULT;
  if(!d.lockedMonths)d.lockedMonths={};
  if(!d.lockedSnapshots)d.lockedSnapshots={};
  if(!d.clients)d.clients=[];
  if(!d.sessions)d.sessions={};
  function fixMonthKeys(obj){
    if(!obj)return obj;
    const fixed={};
    Object.keys(obj).forEach(k=>{
      let mk=k;
      if(!/^\d{4}-\d{2}$/.test(k)){
        const dt=new Date(k);
        if(!isNaN(dt.getTime()))mk=dt.toISOString().slice(0,7);
      }
      if(fixed[mk])Object.assign(fixed[mk],obj[k]);
      else fixed[mk]=obj[k];
    });
    return fixed;
  }
  d.sessions=fixMonthKeys(d.sessions);
  d.lockedMonths=fixMonthKeys(d.lockedMonths);
  // staffId 未設定の既存ゲストを最初のスタッフに紐付け
  const defaultStaffId=d.config.staff[0]?d.config.staff[0].id:null;
  d.clients.forEach(c=>{
    if(!c.courses)c.courses=[];
    if(!c.staffId&&defaultStaffId)c.staffId=defaultStaffId;
    // 新規: clientにplanフィールドを追加（既存はbasicに初期化）
    if(!c.plan)c.plan='basic';
    // 新規: coursesに unitPrice / plan を追加（既存はclient.sessionPriceまたはサービスdefault）
    c.courses.forEach(cr=>{
      if(cr.unitPrice==null){
        // 既存コースの単価: client.sessionPrice優先、なければサービスdefault
        cr.unitPrice=c.sessionPrice||SERVICES[c.service]?.defaultPrice||18000;
      }
      if(!cr.plan)cr.plan=c.plan||'basic';
    });
  });
  // 確定ロックを「スタッフ別」に正規化（旧: 月ごとグローバル {lockedAt:N} → 新: {staffId:lockedAt}）
  Object.keys(d.lockedMonths||{}).forEach(mk=>{
    const v=d.lockedMonths[mk];
    if(!v||typeof v!=='object'){ d.lockedMonths[mk]={}; return; }
    let globalAt=null;
    if('lockedAt' in v) globalAt=v.lockedAt||Date.now();      // 旧グローバル形式
    if('' in v) globalAt=globalAt||v['']||Date.now();          // GAS旧行（空staffId）
    if(globalAt!=null){
      const ns={};
      Object.keys(v).forEach(k=>{ if(k!=='lockedAt'&&k!=='') ns[k]=v[k]; }); // 既存の正規ロックは保持
      // その月にセッションがあるスタッフを確定対象にする（無ければ全スタッフ）
      const staffWithData=new Set();
      const ss=(d.sessions&&d.sessions[mk])?d.sessions[mk]:{};
      (d.clients||[]).forEach(c=>{ if(ss[c.id]&&(ss[c.id].count||0)>0&&c.staffId) staffWithData.add(c.staffId); });
      const targets=staffWithData.size>0?Array.from(staffWithData):(d.config.staff||[]).map(s=>s.id);
      targets.forEach(sid=>{ if(ns[sid]==null) ns[sid]=globalAt; });
      d.lockedMonths[mk]=ns;
    }
  });
  // 旧バージョンのスナップショット（フラット単価でコース値引きを無視した誤った値）を一度だけ破棄。
  // 破棄後は backfillLockedSnapshots() が正しいコース単価ベースで確定月を凍結し直す。
  // クラウド由来の正しいスナップショット（snapshotVersion>=2）は破棄しない。
  if((d.snapshotVersion||0)<2){ d.lockedSnapshots={}; d.snapshotVersion=2; }
}
/* 確定済み月のうちスナップショット未生成のものを、最新のコース単価で正しく凍結する（一度だけ）。
   クラウド同期で最新コースを取得した後に呼ぶこと（古いローカルデータで誤った値を凍結しないため）。
   既存のスナップショットは上書きしない（＝過去の確定値は不変）。 */
function backfillLockedSnapshots(){
  if(!D.lockedMonths)return false;
  if(!D.lockedSnapshots)D.lockedSnapshots={};
  let changed=false;
  Object.keys(D.lockedMonths).forEach(mk=>{
    if(!D.lockedSnapshots[mk])D.lockedSnapshots[mk]={};
    (D.clients||[]).forEach(c=>{
      if(!isLockedForStaff(mk,c.staffId))return; // そのスタッフが確定した分だけ凍結
      if(D.lockedSnapshots[mk][c.id])return; // 既存は不変
      const calc=calcClientMonth(c.id,mk,{live:true});
      if(calc.count>0){D.lockedSnapshots[mk][c.id]={...calc};changed=true;}
    });
  });
  return changed;
}
/* ローカルにあってクラウドに無い確定スナップショットを保護的にマージ（既存は上書きしない）。 */
function mergeSnapshotsInto(target,src){
  if(!src||!target)return;
  Object.keys(src).forEach(mk=>{
    if(!target[mk])target[mk]={};
    Object.keys(src[mk]).forEach(cid=>{
      if(!target[mk][cid])target[mk][cid]=src[mk][cid];
    });
  });
}
/* 旧ロジック（セッション数25回閾値）で計算するpure function。
   既存の確定済み月のスナップショット生成専用。新規計算には使わない。 */
function _calcLegacyForSnapshot(c,mk,d){
  const s=d.sessions[mk]?.[c.id];
  const count=s?s.count:0;
  if(count===0)return{count:0,reward:0,unitReward:0,sessionPrice:0,revenue:0,isCustom:!!c.customEnabled,promoted:false,legacy:true};
  let sessionPrice=(s&&s.sessionPriceOverride!=null)?s.sessionPriceOverride:(c.sessionPrice||0);
  let unitReward=0,roomFee=0;
  if(c.customEnabled){
    if(s&&s.sessionPriceOverride==null)sessionPrice=c.customSessionPrice||0;
    unitReward=(s&&s.rewardOverride!=null)?s.rewardOverride:(c.customReward||0);
    roomFee=Math.max(0,sessionPrice-unitReward);
  }else if(c.service==='aden'){
    roomFee=d.config.prices.aden.room||0;
    unitReward=Math.max(0,sessionPrice-roomFee);
  }else if(c.service==='sub-svc'){
    roomFee=d.config.prices['sub-svc'].room||0;
    unitReward=Math.max(0,sessionPrice-roomFee);
  }else if(c.service==='noic'||c.service==='resync'){
    const p=d.config.prices[c.service];
    if(c.source==='ad')unitReward=p.ad||0;
    else if(c.source==='monitor')unitReward=p.monitor||0;
    else{
      const basePrice=18000,baseReward=p.self||0,deduction=basePrice-baseReward;
      roomFee=deduction;unitReward=Math.max(0,sessionPrice-deduction);
    }
  }
  let reward=0,adSessions=count,promotedSessions=0,promotedRate=0;
  if((c.service==='noic'||c.service==='resync')&&c.source==='ad'&&!c.customEnabled){
    const p=d.config.prices[c.service];
    const adRate=p.ad||6000,basePrice=18000,baseReward=p.self||10000,deduction=basePrice-baseReward;
    promotedRate=Math.max(0,sessionPrice-deduction);
    let consumedTotal=0;
    Object.keys(d.sessions||{}).forEach(key=>{const ss=d.sessions[key][c.id];if(ss)consumedTotal+=Number(ss.count)||0;});
    const consumedBefore=consumedTotal-count;
    const remainingAdQuota=Math.max(0,25-Math.max(0,consumedBefore));
    adSessions=Math.min(count,remainingAdQuota);
    promotedSessions=count-adSessions;
    reward=adSessions*adRate+promotedSessions*promotedRate;
  }else{
    reward=unitReward*count;
  }
  const revenue=c.source==='monitor'?0:sessionPrice*count;
  const promoted=promotedSessions>0;
  let displayUnitReward=unitReward;
  if(promoted){
    if(adSessions===0)displayUnitReward=promotedRate;
    else displayUnitReward=Math.round(reward/count);
  }
  return{count,reward,unitReward:displayUnitReward,baseUnitReward:unitReward,sessionPrice,roomFee,revenue,service:c.service,source:c.source,isCustom:!!c.customEnabled,promoted,adSessions,promotedSessions,promotedRate,legacy:true};
}
function visibleClients(){
  if(isMaster)return D.clients;
  if(!currentStaffId)return [];
  return D.clients.filter(c=>c.staffId===currentStaffId);
}
function findStaff(id){return D.config.staff.find(s=>s.id===id)}
function load(){
  try{const s=localStorage.getItem(SK);D=s?JSON.parse(s):defaultData()}
  catch(e){D=defaultData()}
  migrateData(D);
}
function saveLocal(){localStorage.setItem(SK,JSON.stringify(D))}

/* ===== Cloud Sync ===== */
function updateSyncStatus(state,text){
  const dot=document.getElementById('syncDot');
  const txt=document.getElementById('syncText');
  if(!dot||!txt)return;
  dot.className='sync-dot '+state;
  txt.textContent=text||{online:'接続済み',syncing:'同期中...',offline:'ローカル',error:'接続エラー'}[state]||'';
}
async function fetchFromCloud(retries){
  if(!API_URL)return null;
  if(retries==null)retries=2;
  updateSyncStatus('syncing','読み込み中...');
  try{
    const res=await fetch(API_URL+'?action=getData',{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.error){
      // BUSY なら自動リトライ（短い待機後）
      if((data.error==='BUSY'||/混み合/.test(data.error))&&retries>0){
        await new Promise(r=>setTimeout(r,1500));
        return fetchFromCloud(retries-1);
      }
      throw new Error(data.error);
    }
    updateSyncStatus('online','接続済み');
    return data;
  }catch(e){
    console.warn('Cloud fetch error:',e);
    // ステータスは「ローカル」表示にとどめる（接続エラー赤表示は出さない）
    updateSyncStatus('offline','一時的に未接続（自動再試行）');
    return null;
  }
}
async function saveToCloud(retries){
  if(!API_URL)return false;
  if(retries==null)retries=2;
  updateSyncStatus('syncing','保存中...');
  try{
    const res=await fetch(API_URL+'?action=saveData',{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(D),
      redirect:'follow'
    });
    let result;
    try{result=await res.json()}catch(e){
      if(res.ok||res.type==='opaque'||res.redirected){
        updateSyncStatus('online','保存完了');
        setTimeout(()=>updateSyncStatus('online','接続済み'),2000);
        return true;
      }
      throw new Error('HTTP '+res.status);
    }
    if(result.error){
      if((result.error==='BUSY'||/混み合/.test(result.error))&&retries>0){
        await new Promise(r=>setTimeout(r,2000));
        return saveToCloud(retries-1);
      }
      throw new Error(result.error);
    }
    updateSyncStatus('online','保存完了');
    setTimeout(()=>updateSyncStatus('online','接続済み'),2000);
    return true;
  }catch(e){
    console.warn('Cloud save error:',e);
    // 保存失敗時もローカルに残るので、エラーではなく「未保存（再試行予定）」表示
    updateSyncStatus('offline','未保存（自動再試行）');
    // 5秒後にもう一度試す
    if(retries>0)setTimeout(()=>saveToCloud(retries-1),5000);
    return false;
  }
}
let _lastLocalSaveAt=0;
function save(){
  saveLocal();
  _lastLocalSaveAt=Date.now();
  if(API_URL){
    if(saveTimer)clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>saveToCloud(),SAVE_DELAY);
  }
}
async function syncFromCloud(){
  showLoading('サーバーからデータを取得中...');
  const data=await fetchFromCloud();
  if(data){
    migrateData(data);
    const cloudHasClients=data.clients&&data.clients.length>0;
    const localHasClients=D.clients&&D.clients.length>0;
    if(cloudHasClients){
      if((!data.config.staff||data.config.staff.length===0)&&D.config.staff&&D.config.staff.length>0){
        data.config.staff=D.config.staff;
      }
      // 報酬調整データもクラウドが空ならローカル保持
      if((!data.adjustments||Object.keys(data.adjustments).length===0)&&D.adjustments&&Object.keys(D.adjustments).length>0){
        data.adjustments=D.adjustments;
      }
      mergeSnapshotsInto(data.lockedSnapshots,D.lockedSnapshots);
      D=data;
      const bf=backfillLockedSnapshots();
      saveLocal();render();
      if(bf&&API_URL)saveToCloud();
      alert('最新データを取得しました');
    }else if(localHasClients){
      alert('クラウドにゲストデータがありません。ローカルデータを維持し、クラウドへ保存します。');
      saveToCloud();render();
    }else{
      if((!data.config.staff||data.config.staff.length===0)&&D.config.staff&&D.config.staff.length>0){
        data.config.staff=D.config.staff;
      }
      // 報酬調整データもクラウドが空ならローカル保持
      if((!data.adjustments||Object.keys(data.adjustments).length===0)&&D.adjustments&&Object.keys(D.adjustments).length>0){
        data.adjustments=D.adjustments;
      }
      D=data;saveLocal();render();alert('最新データを取得しました');
    }
  }else{alert('取得に失敗しました。ローカルデータを使用します。');}
  hideLoading();
}
function showLoading(msg){const o=document.getElementById('loadingOverlay');o.textContent=msg||'読み込み中...';o.classList.add('show')}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show')}

/* ===== API URL Setup ===== */
async function saveApiUrl(){
  const url=document.getElementById('apiUrlInput').value.trim();
  if(!url){document.getElementById('setupError').textContent='URLを入力してください';return}
  const btn=document.getElementById('apiUrlSaveBtn');
  btn.disabled=true;btn.textContent='接続テスト中...';
  document.getElementById('setupError').textContent='';
  try{
    const res=await fetch(url+'?action=getData');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    API_URL=url;localStorage.setItem(API_URL_KEY,url);
    migrateData(data);D=data;saveLocal();
    document.getElementById('setupOverlay').classList.remove('open');
    updateSyncStatus('online','接続済み');
    render();
  }catch(e){
    document.getElementById('setupError').textContent='接続失敗: '+e.message;
  }finally{btn.disabled=false;btn.textContent='接続テスト＆保存'}
}
function changeApiUrl(){
  document.getElementById('apiUrlInput').value=API_URL||'';
  document.getElementById('setupError').textContent='';
  document.getElementById('setupOverlay').classList.add('open');
}

/* ===== PIN Auth ===== */
function renderStaffSelector(){
  const sel=document.getElementById('staffSelector');
  if(!sel)return;
  if(loginRole==='admin'){
    sel.classList.add('hidden');
    return;
  }
  sel.classList.remove('hidden');
  if(D.config.staff.length===0){
    if(window.__bootDone){
      sel.innerHTML='<div class="empty">スタッフが未登録です。<br>管理者でログインして追加してください。</div>';
    }else{
      sel.innerHTML='<div class="empty">読み込み中...</div>';
    }
    return;
  }
  sel.innerHTML=D.config.staff.map(s=>`<button onclick="selectStaffForLogin('${s.id}')">${esc(s.name)}</button>`).join('');
}
function selectStaffForLogin(id){
  loginStaffId=id;
  pinBuffer='';updatePinDots();
  document.getElementById('pinError').textContent='';
  const s=findStaff(id);
  document.getElementById('lockRole').textContent=s?s.name:'スタッフ';
  document.getElementById('staffSelector').classList.add('hidden');
  document.getElementById('pinDots').classList.remove('hidden');
  document.getElementById('pinPad').classList.remove('hidden');
  document.getElementById('lockBack').classList.remove('hidden');
}
function backToStaffSelect(){
  loginStaffId=null;pinBuffer='';updatePinDots();
  document.getElementById('pinError').textContent='';
  document.getElementById('lockRole').textContent='スタッフを選択';
  document.getElementById('pinDots').classList.add('hidden');
  document.getElementById('pinPad').classList.add('hidden');
  document.getElementById('lockBack').classList.add('hidden');
  renderStaffSelector();
}
function switchRole(r){
  loginRole=r;loginStaffId=null;pinBuffer='';updatePinDots();
  document.getElementById('pinError').textContent='';
  document.getElementById('roleStaff').classList.toggle('active',r==='staff');
  document.getElementById('roleAdmin').classList.toggle('active',r==='admin');
  if(r==='admin'){
    document.getElementById('lockRole').textContent='管理者';
    document.getElementById('staffSelector').classList.add('hidden');
    document.getElementById('pinDots').classList.remove('hidden');
    document.getElementById('pinPad').classList.remove('hidden');
    document.getElementById('lockBack').classList.add('hidden');
  }else{
    document.getElementById('lockRole').textContent='スタッフを選択';
    document.getElementById('pinDots').classList.add('hidden');
    document.getElementById('pinPad').classList.add('hidden');
    document.getElementById('lockBack').classList.add('hidden');
    renderStaffSelector();
  }
}
function pinInput(n){
  if(pinBuffer.length>=4)return;
  pinBuffer+=n;updatePinDots();
  if(pinBuffer.length===4)setTimeout(checkPin,150);
}
function pinDelete(){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();document.getElementById('pinError').textContent=''}
function updatePinDots(){
  const dots=document.querySelectorAll('#pinDots .pin-dot');
  dots.forEach((d,i)=>d.classList.toggle('filled',i<pinBuffer.length));
}
function checkPin(){
  let target=null;
  if(loginRole==='admin'){
    target=D.config.masterPin;
  }else if(loginStaffId){
    const s=findStaff(loginStaffId);
    target=s?s.pin:null;
  }
  if(target==null){
    document.getElementById('pinError').textContent='スタッフを選択してください';
    pinBuffer='';updatePinDots();return;
  }
  if(pinBuffer===target){
    isMaster=loginRole==='admin';
    currentStaffId=isMaster?null:loginStaffId;
    document.getElementById('lockScreen').classList.add('hidden');
    initApp();
  }else{
    document.getElementById('pinError').textContent='PINが違います';
    pinBuffer='';updatePinDots();
  }
}
async function logout(){
  isMaster=false;currentStaffId=null;pinBuffer='';updatePinDots();
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('pinError').textContent='';
  switchRole('staff');
  if(API_URL){
    const data=await fetchFromCloud();
    if(data){
      migrateData(data);
      const cloudHasClients=data.clients&&data.clients.length>0;
      if(cloudHasClients){
        if((!data.config.staff||data.config.staff.length===0)&&D.config.staff&&D.config.staff.length>0){
          data.config.staff=D.config.staff;
        }
        if((!data.adjustments||Object.keys(data.adjustments).length===0)&&D.adjustments&&Object.keys(D.adjustments).length>0){
          data.adjustments=D.adjustments;
        }
        D=data;saveLocal();renderStaffSelector();
      }
    }
  }
}

/* ===== Month Nav ===== */
function monthKey(d){return d.toISOString().slice(0,7)}
function monthDisplay(mk){const[y,m]=mk.split('-');return y+'年'+parseInt(m)+'月'}
function changeMonth(delta){
  const d=new Date(currentMonth+'-01');
  d.setMonth(d.getMonth()+delta);
  currentMonth=monthKey(d);
  render();
}
/* 確定ロックは「スタッフ別」。D.lockedMonths[mk]={ [staffId]: lockedAt } */
function isLockedForStaff(mk,staffId){return !!(D.lockedMonths[mk]&&staffId&&D.lockedMonths[mk][staffId]);}
function isLockedForClient(mk,clientId){const c=D.clients.find(x=>x.id===clientId);return c?isLockedForStaff(mk,c.staffId):false;}
/* 現在の閲覧者にとって編集ロックされているか（管理者は常に編集可） */
function isLocked(mk){ if(isMaster)return false; return isLockedForStaff(mk,currentStaffId); }

/* ===== Session Helpers ===== */
function getSessionData(clientId,mk){
  if(!D.sessions[mk])return null;
  return D.sessions[mk][clientId]||null;
}
function ensureSession(clientId,mk){
  if(!D.sessions[mk])D.sessions[mk]={};
  if(!D.sessions[mk][clientId]){
    D.sessions[mk][clientId]={count:0,sessionPriceOverride:null};
  }
  return D.sessions[mk][clientId];
}

/* ===== Ticket Helpers ===== */
function getTicketInfo(clientId){
  const c=D.clients.find(x=>x.id===clientId);
  if(!c)return{total:0,used:0,remaining:0};
  const total=c.courses.reduce((s,cr)=>s+cr.total,0);
  let used=0;
  Object.keys(D.sessions).forEach(mk=>{
    if(D.sessions[mk][clientId])used+=D.sessions[mk][clientId].count;
  });
  return{total,used,remaining:total-used};
}

/* ===== Calculation ===== */
/* 累計セッション数（指定月を含むかどうか） */
function getCumSessionsBefore(clientId,mk){
  let total=0;
  Object.keys(D.sessions||{}).sort().forEach(k=>{
    if(k>=mk)return;
    const ss=D.sessions[k]?.[clientId];
    if(ss)total+=Number(ss.count)||0;
  });
  return total;
}
/* sessionIndex(1-based)に対応するコースを返す */
function getCourseForSession(c,sessionIndex){
  let acc=0;
  for(const cr of (c.courses||[])){
    if(sessionIndex<=acc+cr.total)return cr;
    acc+=cr.total;
  }
  // チケット残数を超えた場合は最後のコースの単価を使用
  return (c.courses||[]).slice(-1)[0]||null;
}
function getUnitPriceForSession(c,sessionIndex){
  const cr=getCourseForSession(c,sessionIndex);
  if(cr&&cr.unitPrice!=null)return cr.unitPrice;
  return c.sessionPrice||SERVICES[c.service]?.defaultPrice||18000;
}
function getPlanForSession(c,sessionIndex){
  const cr=getCourseForSession(c,sessionIndex);
  return (cr&&cr.plan)||c.plan||'basic';
}
/* 累計売上(LTV)を計算 — 過去全月の各セッションの unitPrice の合計 */
function getCumLTVBefore(clientId,mk){
  const c=D.clients.find(x=>x.id===clientId);
  if(!c)return 0;
  const cumSessions=getCumSessionsBefore(clientId,mk);
  let ltv=0;
  for(let i=1;i<=cumSessions;i++){
    ltv+=getUnitPriceForSession(c,i);
  }
  return ltv;
}
/* プラン別の標準報酬を取得（D.config.pricesと連動）
   unitPrice: そのセッションの単価。満額未満（値引き）なら自力扱いレートを適用 */
function getStandardReward(c,plan,source,promoted,unitPrice){
  const svc=c.service; // 'noic' or 'resync'
  const cfg=D.config.prices[svc]||{};
  if(plan==='lite'){
    const liteCfg=cfg.lite||{ad:4500,self:6000,monitor:2500};
    if(source==='monitor')return liteCfg.monitor||2500;
    // Lite は値引き概念なし。LTV超えのみ昇格（6,000円）
    if(promoted){
      return PLANS.lite.rewards.ltvAd||6000;
    }
    return source==='ad'?(liteCfg.ad||4500):(liteCfg.self||6000);
  }
  // basic
  if(source==='monitor')return cfg.monitor||2500;
  const fullPrice=PLANS.basic.defaultPrice||18000; // 満額 18,000円
  // 広告経由: LTV突破まで一律6,000円（単価に関係なし）。突破後は8,000円
  if(source==='ad'){
    return promoted?(PLANS.basic.rewards.ltvAd||8000):(cfg.ad||6000);
  }
  // 自己集客: 満額(18,000)なら10,000円。値引き(15,000等)またはLTV突破なら8,000円
  const isDiscounted=unitPrice!=null&&unitPrice<fullPrice;
  if(promoted||isDiscounted){
    return PLANS.basic.rewards.ltvAd||8000;
  }
  return cfg.self||10000;
}

function calcClientMonth(clientId,mk,opts){
  const c=D.clients.find(x=>x.id===clientId);
  if(!c)return{count:0,reward:0,unitReward:0,sessionPrice:0,roomFee:0,revenue:0,service:null,source:null,isCustom:false,promoted:false,consumedTotal:0,adSessions:0,promotedSessions:0,promotedRate:0,ltvAtStart:0,ltvAfter:0};
  // 確定済み月は「確定時点のスナップショット」を返す。
  // → 後からコース単価を変更・追加しても、過去の確定月の金額は変わらない（遡及しない）。
  // opts.live=true のときだけ凍結を無視して最新データでライブ再計算する（スナップショット生成用）。
  if(!(opts&&opts.live) && isLockedForStaff(mk,c.staffId) && D.lockedSnapshots&&D.lockedSnapshots[mk]&&D.lockedSnapshots[mk][clientId]){
    return D.lockedSnapshots[mk][clientId];
  }
  const s=getSessionData(clientId,mk);
  const count=s?s.count:0;

  // セッション単価override（月レベル）が有効ならそれを優先（既存運用との互換性）
  const overridePrice=(s&&s.sessionPriceOverride!=null)?s.sessionPriceOverride:null;

  // ===== ADEN / SUB（ルーム差し引き型・コース単価ベース／LTV昇格なし） =====
  if(c.service==='aden'||c.service==='sub-svc'){
    // カスタムモードは従来通り（個別単価・報酬を直接指定）
    if(c.customEnabled){
      let sessionPrice=overridePrice!=null?overridePrice:(c.customSessionPrice||0);
      const unitReward=(s&&s.rewardOverride!=null)?s.rewardOverride:(c.customReward||0);
      const reward=unitReward*count;
      const revenue=sessionPrice*count;
      return{count,reward,unitReward,baseUnitReward:unitReward,sessionPrice,roomFee:Math.max(0,sessionPrice-unitReward),revenue,service:c.service,source:c.source,isCustom:true,promoted:false,consumedTotal:getConsumedTotal(c.id),adSessions:0,promotedSessions:0,promotedRate:0,ltvAtStart:0,ltvAfter:0};
    }
    // 通常: コース単価ベースで計算（コースごとに単価が変わる＝値引きコースに自然対応）
    const roomFeeCfg=D.config.prices[c.service].room||0;
    const cumSessionsBefore=getCumSessionsBefore(clientId,mk);
    let totalReward=0,totalRevenue=0;
    const priceTallies={};
    let firstSessionPrice=0;
    for(let i=0;i<count;i++){
      const sessionIndex=cumSessionsBefore+i+1;
      const unitPrice=overridePrice!=null?overridePrice:getUnitPriceForSession(c,sessionIndex);
      const reward=Math.max(0,unitPrice-roomFeeCfg);
      totalReward+=reward;
      totalRevenue+=unitPrice;
      if(i===0)firstSessionPrice=unitPrice;
      priceTallies[unitPrice]=(priceTallies[unitPrice]||0)+1;
    }
    // 表示用（count=0なら次セッションの想定単価）
    let sessionPrice,displayUnitReward;
    if(count>0){
      const distinctPrices=Object.keys(priceTallies);
      sessionPrice=distinctPrices.length===1?Number(distinctPrices[0]):firstSessionPrice;
      displayUnitReward=Math.round(totalReward/count);
    }else{
      const nextIndex=cumSessionsBefore+1;
      sessionPrice=getUnitPriceForSession(c,nextIndex)||c.sessionPrice||SERVICES[c.service].defaultPrice;
      displayUnitReward=Math.max(0,sessionPrice-roomFeeCfg);
    }
    return{count,reward:totalReward,unitReward:displayUnitReward,baseUnitReward:displayUnitReward,sessionPrice,roomFee:roomFeeCfg,revenue:totalRevenue,service:c.service,source:c.source,isCustom:false,promoted:false,consumedTotal:cumSessionsBefore+count,adSessions:0,promotedSessions:0,promotedRate:0,priceTallies,ltvAtStart:0,ltvAfter:0};
  }

  // ===== カスタムモード =====
  if(c.customEnabled){
    let sessionPrice=overridePrice!=null?overridePrice:(c.customSessionPrice||0);
    const unitReward=(s&&s.rewardOverride!=null)?s.rewardOverride:(c.customReward||0);
    const reward=unitReward*count;
    const revenue=c.source==='monitor'?0:sessionPrice*count;
    return{count,reward,unitReward,baseUnitReward:unitReward,sessionPrice,roomFee:Math.max(0,sessionPrice-unitReward),revenue,service:c.service,source:c.source,isCustom:true,promoted:false,consumedTotal:getConsumedTotal(c.id),adSessions:0,promotedSessions:0,promotedRate:0,ltvAtStart:0,ltvAfter:0};
  }

  // ===== NOIC / resync — LTV 432,000円ベースの新ロジック =====
  const ltvThreshold=D.config.ltvThreshold||LTV_THRESHOLD_DEFAULT;
  const cumSessionsBefore=getCumSessionsBefore(clientId,mk);
  const ltvBefore=getCumLTVBefore(clientId,mk);
  let cumLTV=ltvBefore;
  let totalReward=0,totalRevenue=0;
  let adSessions=0,promotedSessions=0;
  const priceTallies={}; // 単価別の集計（混在時の表示用）
  let firstSessionPrice=0;

  for(let i=0;i<count;i++){
    const sessionIndex=cumSessionsBefore+i+1;
    let unitPrice=overridePrice!=null?overridePrice:getUnitPriceForSession(c,sessionIndex);
    const plan=getPlanForSession(c,sessionIndex);
    const ltvAtStart=cumLTV; // このセッション開始前のLTV
    const isPromoted=ltvAtStart>=ltvThreshold;
    const reward=getStandardReward(c,plan,c.source||'ad',isPromoted,unitPrice);
    totalReward+=reward;
    if(c.source!=='monitor')totalRevenue+=unitPrice;
    if(isPromoted)promotedSessions++;
    else adSessions++;
    cumLTV+=unitPrice;
    if(i===0)firstSessionPrice=unitPrice;
    priceTallies[unitPrice]=(priceTallies[unitPrice]||0)+1;
  }

  // count=0 の場合は、次のセッションの想定単価・想定報酬を表示用に算出
  let sessionPrice,displayUnitReward;
  if(count>0){
    const distinctPrices=Object.keys(priceTallies);
    sessionPrice=distinctPrices.length===1?Number(distinctPrices[0]):firstSessionPrice;
    displayUnitReward=Math.round(totalReward/count);
  }else{
    // 想定: 次のセッションは累計+1回目
    const nextIndex=cumSessionsBefore+1;
    sessionPrice=getUnitPriceForSession(c,nextIndex)||c.sessionPrice||SERVICES[c.service]?.defaultPrice||18000;
    const nextPlan=getPlanForSession(c,nextIndex);
    const isPromotedNext=ltvBefore>=ltvThreshold;
    displayUnitReward=getStandardReward(c,nextPlan,c.source||'ad',isPromotedNext,sessionPrice);
  }
  // 表示用promotedRate
  const lastPlan=getPlanForSession(c,Math.max(1,cumSessionsBefore+count));
  const promotedRate=PLANS[lastPlan]?.rewards.ltvAd||8000;

  return{
    count,
    reward:totalReward,
    unitReward:displayUnitReward,
    baseUnitReward:displayUnitReward,
    sessionPrice,
    roomFee:0,
    revenue:totalRevenue,
    service:c.service,
    source:c.source,
    isCustom:false,
    promoted:promotedSessions>0,
    consumedTotal:cumSessionsBefore+count,
    adSessions,
    promotedSessions,
    promotedRate,
    priceTallies,
    ltvAtStart:ltvBefore,
    ltvAfter:cumLTV
  };
}
function getConsumedTotal(clientId){
  let total=0;
  Object.keys(D.sessions||{}).forEach(mk=>{
    const s=D.sessions[mk][clientId];
    if(s)total+=Number(s.count)||0;
  });
  return total;
}
function calcMonth(mk,clientList){
  const list=clientList||visibleClients();
  let totalReward=0,totalRevenue=0,totalSessions=0,activeClients=0;
  const byService={aden:{reward:0,revenue:0,count:0,clients:0},'sub-svc':{reward:0,revenue:0,count:0,clients:0},
    noic:{reward:0,revenue:0,count:0,clients:0,ad:{reward:0,count:0},self:{reward:0,count:0},monitor:{reward:0,count:0}},
    resync:{reward:0,revenue:0,count:0,clients:0,ad:{reward:0,count:0},self:{reward:0,count:0},monitor:{reward:0,count:0}}};
  const details=[];
  list.forEach(c=>{
    const r=calcClientMonth(c.id,mk);
    if(r.count>0){
      totalReward+=r.reward;totalRevenue+=r.revenue;totalSessions+=r.count;activeClients++;
      const svc=byService[c.service];
      if(svc){svc.reward+=r.reward;svc.revenue+=r.revenue;svc.count+=r.count;svc.clients++;
        if(c.source&&svc[c.source]){svc[c.source].reward+=r.reward;svc[c.source].count+=r.count;}
      }
      details.push({...r,client:c});
    }
  });
  return{totalReward,totalRevenue,totalSessions,activeClients,byService,details};
}

              ? `単価混在 ／ ルーム料 ¥${r.roomFee.toLocaleString()} = 平均報酬 ¥${r.unitReward.toLocaleString()}/回<br>`+Object.entries(r.priceTallies).map(([p,n])=>`¥${Number(p).toLocaleString()}×${n}回（報酬¥${Math.max(0,Number(p)-r.roomFee).toLocaleString()}）`).join(' ／ ')
              : `セッション料: ¥${r.sessionPrice.toLocaleString()} − ルーム料 ¥${r.roomFee.toLocaleString()} = ¥${r.unitReward.toLocaleString()}/回`)
            :isNoicResync?(()=>{
              const ltvBefore=r.ltvAtStart||0;
              const ltvAfter=r.ltvAfter||ltvBefore;
              const threshold=D.config.ltvThreshold||432000;
              const ltvBadge=ltvBefore>=threshold?`<span style="color:#d4ac0d;font-weight:600">⭐ 自力扱い昇格済（LTV ¥${ltvBefore.toLocaleString()}）</span>`:`累計LTV ¥${ltvBefore.toLocaleString()}／閾値 ¥${threshold.toLocaleString()}`;
              const mixedNote=r.promoted&&r.adSessions>0?`<br>今月: 通常${r.adSessions}回＋昇格${r.promotedSessions}回`:'';
              return `報酬単価 ¥${r.unitReward.toLocaleString()}/回（${sourceLabel(c.source)}）<br>${ltvBadge}${mixedNote}`;
            })()
            :`報酬単価: ¥${r.unitReward.toLocaleString()}/回（${sourceLabel(c.source)}）`}
        </div>
        <div class="session-row">
          <div class="session-controls">
            <button class="minus" onclick="changeCount('${c.id}',-1)" ${locked&&!isMaster?'disabled':''}>−</button>
            <span class="count">${s.count}</span>
            <button onclick="changeCount('${c.id}',1)" ${(locked&&!isMaster)||(!canAdd)?'disabled':''}${!canAdd?' title="チケットがありません"':''}>＋</button>
          </div>
          <div class="session-reward">
            <div class="amount positive">¥${r.reward.toLocaleString()}</div>
            <div class="unit-price">${r.promoted&&r.adSessions>0?`通常${r.adSessions}回＋昇格${r.promotedSessions}回（平均¥${r.unitReward.toLocaleString()}/回）`:r.promoted?`@¥${r.unitReward.toLocaleString()}/回（⭐自力扱い）`:`@¥${r.unitReward.toLocaleString()}/回`}</div>
            ${r.count>0?`<div style="font-size:10px;color:var(--text-light);margin-top:2px">売上 ¥${r.revenue.toLocaleString()}</div>`:''}
          </div>
        </div>
        ${(isHybridReward||c.customEnabled)?`
        <div class="price-override">
          <label>セッション料金</label>
          <input type="number" value="${r.sessionPrice}" onchange="changeSessionPrice('${c.id}',this.value)" ${!isMaster?'disabled':''}>
          <span style="font-size:11px;color:var(--text-light)">円${overridden?' ※今月のみ':''}${!isMaster?' 🔒管理者のみ':''}</span>
          ${overridden&&isMaster?`<button class="reset" onclick="resetSessionPrice('${c.id}')">基本に戻す</button>`:''}
        </div>`:''}
      </div>`;
    }).join('');
  }

  const lbtn=document.getElementById('lockButton');
  if(isMaster){
    // 管理者は確定操作をしない（解除は「設定 ＞ 確定済み月の管理」でスタッフ別に行う）
    lbtn.innerHTML='';
  }else if(isLockedForStaff(mk,currentStaffId)){
    lbtn.innerHTML=`<div class="lock-banner" style="margin-top:12px"><span class="icon">🔒</span>${monthDisplay(mk)} のあなたの分は確定済みです（解除は管理者へ）</div>`;
  }else{
    lbtn.innerHTML=`<button class="btn btn-lock" onclick="confirmMyMonth()">🔒 ${monthDisplay(mk)} を確定する</button>`;
  }
}

/* ===== 報酬調整 ===== */
function getAdjustment(mk,staffKey){
  if(!D.adjustments)D.adjustments={};
  if(!D.adjustments[mk])D.adjustments[mk]={};
  if(!D.adjustments[mk][staffKey])D.adjustments[mk][staffKey]={enabled:false,amount:0,reason:''};
  return D.adjustments[mk][staffKey];
}
function toggleAdjustment(mk,staffKey,enabled){
  // 不正防止: 管理者以外は報酬調整不可
  if(!isMaster){alert('報酬調整は管理者のみ可能です');render();return}
  const adj=getAdjustment(mk,staffKey);
  const inpA=document.getElementById('adjAmount');
  const inpR=document.getElementById('adjReason');
  if(inpA)adj.amount=parseInt(inpA.value)||0;
  if(inpR)adj.reason=inpR.value||'';
  adj.enabled=!!enabled;
  save();render();
}
function saveAdjustment(mk,staffKey){
  // 不正防止: 管理者以外は報酬調整不可
  if(!isMaster){alert('報酬調整は管理者のみ可能です');return}
  const adj=getAdjustment(mk,staffKey);
  adj.amount=parseInt(document.getElementById('adjAmount').value)||0;
  adj.reason=document.getElementById('adjReason').value||'';
  adj.enabled=true;
  save();render();
  // 軽い通知
  const t=document.createElement('div');
  t.textContent='✅ 調整を保存しました';
  t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:8px;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.2)';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1800);
}

function renderClients(){
  const el=document.getElementById('tabClients');
  const myClients=visibleClients();
  if(myClients.length===0){
    el.innerHTML='<div class="card"><div class="card-title">👤 ゲスト一覧</div><div class="empty-state"><div class="icon">👤</div><p>ゲストを追加してください</p></div></div><button class="btn btn-outline" onclick="openAddClient()">＋ ゲストを追加</button>';
    return;
  }
  const sorted=[...myClients].sort((a,b)=>{
    const so={aden:0,'sub-svc':1,noic:2,resync:3};
    if(so[a.service]!==so[b.service])return so[a.service]-so[b.service];
    return a.name.localeCompare(b.name,'ja');
  });
  let html='<div class="card"><div class="card-title">👤 ゲスト一覧（'+myClients.length+'名）</div>';
  sorted.forEach(c=>{
    const tk=getTicketInfo(c.id);
    const sourceBadge=c.source?'<span class="badge source-'+c.source+'">'+sourceLabel(c.source)+'</span>':'';
    const isNR=c.service==='noic'||c.service==='resync';
    const planBadge=isNR?(c.plan==='lite'?'<span class="badge" style="background:#E8913A">Lite</span>':'<span class="badge" style="background:#16a085">Basic</span>'):'';
    const staff=findStaff(c.staffId);
    const staffBadge=isMaster&&staff?'<span class="badge" style="background:#34495e">'+esc(staff.name)+'</span>':'';
    const customBadge=c.customEnabled?'<span class="badge" style="background:#16a085">⚙️カスタム</span>':'';
    const isRoom=c.service==='aden'||c.service==='sub-svc';
    let metaText;
    if(c.customEnabled){
      metaText='カスタム: 単価 ¥'+(c.customSessionPrice||0).toLocaleString()+' ／ 報酬 ¥'+(c.customReward||0).toLocaleString()+'/回';
    }else if(isRoom){metaText='セッション料 ¥'+(c.sessionPrice||0).toLocaleString()}
    else if(isNR){
      // 累計LTVを表示
      const ltv=getCumLTVBefore(c.id,currentMonth)+(D.sessions[currentMonth]?.[c.id]?D.sessions[currentMonth][c.id].count*(c.courses?.[0]?.unitPrice||c.sessionPrice||18000):0);
      const totalLTV=Object.keys(D.sessions||{}).reduce((acc,mk)=>{
        const s=D.sessions[mk]?.[c.id];return s?acc+s.count:acc;
      },0);
      // 累計LTVをコース単価を考慮して算出
      let actualLTV=0;
      for(let i=1;i<=totalLTV;i++)actualLTV+=getUnitPriceForSession(c,i);
      const threshold=D.config.ltvThreshold||432000;
      const ltvBadge=actualLTV>=threshold?'<span style="color:#d4ac0d;font-weight:600">⭐自力扱い昇格済</span>':'';
      metaText=`累計 ${totalLTV}回 ／ 累計LTV ¥${actualLTV.toLocaleString()} ${ltvBadge}`;
    }
    else{metaText='報酬単価 (詳細表示なし)'}
    html+=`<div style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openEditClient('${c.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><span style="font-weight:700">${esc(c.name)}</span> <span class="badge ${svcClass(c.service)}">${svcLabel(c.service)}</span>${planBadge}${sourceBadge}${customBadge}${staffBadge}</div>
        <div style="font-size:12px;color:var(--text-light)">残${tk.remaining} / ${tk.total}回</div>
      </div>
      <div style="font-size:12px;color:var(--text-light);margin-top:2px">
        ${metaText}
      </div>
    </div>`;
  });
  html+='</div><button class="btn btn-outline" style="margin-top:12px" onclick="openAddClient()">＋ ゲストを追加</button>';
  el.innerHTML=html;
}

/* ===== Actions ===== */
function resetSessionCount(clientId){
  if(!isMaster){alert('管理者のみ操作可能です');return}
  if(!confirm('このゲストの今月のセッション回数を0にリセットしますか？'))return;
  const mk=currentMonth;
  if(D.sessions[mk]&&D.sessions[mk][clientId]){
    delete D.sessions[mk][clientId];
    if(Object.keys(D.sessions[mk]).length===0)delete D.sessions[mk];
  }
  save();render();
}
function changeCount(clientId,delta){
  const mk=currentMonth;
  if(isLocked(mk)&&!isMaster){alert('この月は確定済みのため編集できません');return}
  const s=ensureSession(clientId,mk);
  const newCount=s.count+delta;
  if(newCount<0)return;
  if(delta>0){
    const tk=getTicketInfo(clientId);
    // 全サービス（モニター含む）コース登録必須
    if(tk.total<=0){
      alert('コース（チケット）が登録されていません。\nまずコースを登録してください。');
      return;
    }
    if(tk.remaining<=0){
      alert('チケットの残りがありません。\n追加購入してからカウントしてください。');
      return;
    }
  }
  s.count=newCount;
  if(s.count===0&&s.sessionPriceOverride==null){
    delete D.sessions[mk][clientId];
    if(Object.keys(D.sessions[mk]).length===0)delete D.sessions[mk];
  }
  save();render();
}
function changeSessionPrice(clientId,val){
  if(!isMaster){alert('セッション料金の変更は管理者のみ可能です');return}
  const mk=currentMonth;
  const s=ensureSession(clientId,mk);
  const c=D.clients.find(x=>x.id===clientId);
  const newPrice=parseInt(val)||0;
  if(c&&newPrice===c.sessionPrice){
    s.sessionPriceOverride=null;
  }else{
    s.sessionPriceOverride=newPrice;
  }
  save();render();
}
function resetSessionPrice(clientId){
  if(!isMaster){alert('セッション料金の変更は管理者のみ可能です');return}
  const mk=currentMonth;
  const s=ensureSession(clientId,mk);
  s.sessionPriceOverride=null;
  if(s.count===0){
    delete D.sessions[mk][clientId];
    if(Object.keys(D.sessions[mk]).length===0)delete D.sessions[mk];
  }
  save();render();
}
function snapshotStaffMonth(mk,staffId){
  // 指定スタッフの当月クライアントを「確定時点の正しい計算」で凍結する。
  if(!D.lockedSnapshots)D.lockedSnapshots={};
  if(!D.lockedSnapshots[mk])D.lockedSnapshots[mk]={};
  D.clients.forEach(c=>{
    if(c.staffId!==staffId)return;
    const calc=calcClientMonth(c.id,mk,{live:true});
    if(calc.count>0)D.lockedSnapshots[mk][c.id]={...calc};
  });
}
/* 各スタッフが「自分の分」を確定する（解除は管理者のみ） */
function confirmMyMonth(){
  const mk=currentMonth;
  if(isMaster){alert('確定は各スタッフが行います。\n管理者は「設定 ＞ 確定済み月の管理」でスタッフ別に解除できます。');return}
  if(!currentStaffId)return;
  if(isLockedForStaff(mk,currentStaffId)){
    alert(monthDisplay(mk)+'は確定済みです。\n解除が必要な場合は管理者にご依頼ください。');return;
  }
  if(!confirm(monthDisplay(mk)+'のあなたの分を確定しますか？\n確定後の編集・解除は管理者のみ可能です。\n（確定時点の報酬額が保存され、以後コース単価を変えても確定分は変わりません）'))return;
  if(!D.lockedMonths[mk])D.lockedMonths[mk]={};
  D.lockedMonths[mk][currentStaffId]=Date.now();
  snapshotStaffMonth(mk,currentStaffId);
  save();render();
}
/* 管理者が「スタッフ別」に確定を解除する */
function unlockStaffMonth(mk,staffId){
  if(!isMaster){alert('確定解除は管理者のみ可能です');return}
  const st=findStaff(staffId);
  if(!confirm(monthDisplay(mk)+'の「'+(st?st.name:staffId)+'」の確定を解除しますか？\n※解除後はそのスタッフ分が最新ルールで再計算されます。'))return;
  if(D.lockedMonths[mk]){
    delete D.lockedMonths[mk][staffId];
    if(Object.keys(D.lockedMonths[mk]).length===0)delete D.lockedMonths[mk];
  }
  // 解除したスタッフのスナップショットは破棄（ライブ計算に戻す。再確定時に再生成される）
  if(D.lockedSnapshots&&D.lockedSnapshots[mk]){
    (D.clients||[]).forEach(c=>{ if(c.staffId===staffId) delete D.lockedSnapshots[mk][c.id]; });
    if(Object.keys(D.lockedSnapshots[mk]).length===0)delete D.lockedSnapshots[mk];
  }
  save();render();
}
function updateConfig(key,val){
  if(key==='aden_room')D.config.prices.aden.room=parseInt(val)||0;
  else if(key==='sub_room')D.config.prices['sub-svc'].room=parseInt(val)||0;
  else if(key==='noic_ad')D.config.prices.noic.ad=parseInt(val)||0;
  else if(key==='noic_self')D.config.prices.noic.self=parseInt(val)||0;
  else if(key==='noic_monitor')D.config.prices.noic.monitor=parseInt(val)||0;
  else if(key==='noic_lite_ad')D.config.prices.noic.lite.ad=parseInt(val)||0;
  else if(key==='noic_lite_self')D.config.prices.noic.lite.self=parseInt(val)||0;
  else if(key==='noic_lite_monitor')D.config.prices.noic.lite.monitor=parseInt(val)||0;
  else if(key==='resync_ad')D.config.prices.resync.ad=parseInt(val)||0;
  else if(key==='resync_self')D.config.prices.resync.self=parseInt(val)||0;
  else if(key==='resync_monitor')D.config.prices.resync.monitor=parseInt(val)||0;
  else if(key==='resync_lite_ad')D.config.prices.resync.lite.ad=parseInt(val)||0;
  else if(key==='resync_lite_self')D.config.prices.resync.lite.self=parseInt(val)||0;
  else if(key==='resync_lite_monitor')D.config.prices.resync.lite.monitor=parseInt(val)||0;
  else if(key==='ltvThreshold')D.config.ltvThreshold=parseInt(val)||LTV_THRESHOLD_DEFAULT;
  else if(key==='masterPin')D.config.masterPin=String(val||'0000').padStart(4,'0');
  save();render();
}

/* ===== Ticket CRUD ===== */
function openAddTicket(clientId){
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const tk=getTicketInfo(clientId);
  const hasPlan=SERVICES[c.service]?.hasPlan;
  // 現状のLTVから推奨単価を判定
  const mk=currentMonth;
  let coursesHtml='';
  if(c.courses.length>0){
    coursesHtml='<div style="margin-bottom:14px"><label>購入履歴</label><div class="course-list">';
    c.courses.forEach((cr,i)=>{
      const dt=new Date(cr.addedAt);
      const planLabel=cr.plan==='lite'?' <span style="color:#E8913A;font-size:11px;font-weight:600">Lite</span>':(cr.plan==='basic'&&hasPlan?' <span style="color:#2D7D5F;font-size:11px;font-weight:600">Basic</span>':'');
      const priceLabel=cr.unitPrice!=null?` <span style="font-size:11px;color:var(--text-light)">@¥${cr.unitPrice.toLocaleString()}</span>`:'';
      coursesHtml+=`<div class="course-item"><span>${dt.toLocaleDateString('ja-JP')} — ${cr.total}回${planLabel}${priceLabel}</span>${isMaster?`<button class="course-del" onclick="deleteCourse('${clientId}',${i})" title="削除">×</button>`:'<span style="font-size:11px;color:var(--text-light)">🔒</span>'}</div>`;
    });
    coursesHtml+=`</div><div style="font-size:12px;color:var(--text-light);margin-top:4px">合計 ${tk.total}回購入 ／ ${tk.used}回消化 ／ 残り ${tk.remaining}回</div></div>`;
  }
  // 現在の累計LTV（参考表示）
  const ltvBefore=getCumLTVBefore(c.id,mk);
  const isRoom=c.service==='aden'||c.service==='sub-svc';
  // プラン選択 (NOIC/resyncのみ)
  const initialPlan=c.plan||'basic';
  // デフォルト単価のサジェスト
  let suggestedPrice;
  if(isRoom){
    suggestedPrice=SERVICES[c.service].defaultPrice||18000;
  }else if(hasPlan){
    // LTV 432,000円以上なら、値引き(15000)を推奨
    if(ltvBefore>=(D.config.ltvThreshold||432000)){
      suggestedPrice=initialPlan==='lite'?12000:15000;
    }else{
      suggestedPrice=initialPlan==='lite'?12000:18000;
    }
  }else{
    suggestedPrice=c.sessionPrice||18000;
  }
  // コース追加時はスタッフもプラン選択・単価変更可（Basic→Lite継続などに対応）
  const planSelector=hasPlan?`
    <div class="form-group"><label>プラン</label>
      <div class="source-radio-group" id="tkPlanGroup">
        <div class="source-radio active" data-plan="basic" onclick="selectTicketPlan('basic')">Basic（50分）</div>
        <div class="source-radio" data-plan="lite" onclick="selectTicketPlan('lite')">Lite（25分）</div>
      </div>
    </div>`:'';
  const ltvDisplay=hasPlan?`
    <div style="background:#f0f9f4;border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px">
      <div style="color:var(--text-light);margin-bottom:4px">📊 累計LTV（参考）</div>
      <div style="font-size:15px;font-weight:700;color:var(--accent)">¥${ltvBefore.toLocaleString()}</div>
      ${ltvBefore>=(D.config.ltvThreshold||432000)?'<div style="color:#d4ac0d;margin-top:4px;font-weight:600">⭐ LTV 432,000円を超過済 — 25回〜値引き単価(¥15,000)を推奨</div>':`<div style="color:var(--text-light);margin-top:4px">あと ¥${((D.config.ltvThreshold||432000)-ltvBefore).toLocaleString()} で自力扱いに昇格</div>`}
    </div>`:'';
  const html=`
    <div class="modal-header"><h2>🎫 ${esc(c.name)} — コース追加</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    ${coursesHtml}
    ${ltvDisplay}
    ${planSelector}
    <div class="form-group"><label>追加する回数</label><input id="tkCount" type="number" placeholder="例: 16" inputmode="numeric" min="1"></div>
    <div class="form-group"><label>セッション単価（円/回） <span style="font-size:11px;color:var(--text-light)">※コース内のセッションはこの単価で計上</span></label><input id="tkUnitPrice" type="number" inputmode="numeric" min="0" oninput="this.dataset.userTouched=1" value="${suggestedPrice}"></div>
    <button class="btn btn-primary" onclick="saveTicket('${clientId}')">追加する</button>`;
  openModal(html);
  // プラン選択の初期化
  window._tkPlan=initialPlan;
  setTimeout(()=>{
    if(hasPlan){
      document.querySelectorAll('#tkPlanGroup .source-radio').forEach(r=>{
        r.classList.toggle('active',r.dataset.plan===initialPlan);
      });
    }
  },10);
}
function selectTicketPlan(plan){
  window._tkPlan=plan;
  document.querySelectorAll('#tkPlanGroup .source-radio').forEach(r=>{
    r.classList.toggle('active',r.dataset.plan===plan);
  });
  // 単価フィールドを自動更新（ユーザーが手で変えた場合は上書きしない）
  const inp=document.getElementById('tkUnitPrice');
  if(inp&&!inp.dataset.userTouched){
    inp.value=plan==='lite'?12000:18000;
  }
}
function saveTicket(clientId){
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const count=parseInt(document.getElementById('tkCount').value)||0;
  if(count<=0){alert('1以上の回数を入力してください');return}
  const hasPlan=SERVICES[c.service]?.hasPlan;
  // コース追加時はスタッフもプラン・単価を設定可（Basic→Lite継続等に対応）
  const planVal=hasPlan?(window._tkPlan||c.plan||'basic'):'basic';
  const inpPrice=document.getElementById('tkUnitPrice');
  let unitPrice=inpPrice?parseInt(inpPrice.value)||0:0;
  if(unitPrice<=0)unitPrice=c.sessionPrice||SERVICES[c.service]?.defaultPrice||18000;
  c.courses.push({id:'tk_'+Date.now(),total:count,addedAt:Date.now(),unitPrice,plan:planVal});
  save();closeModal();render();
}
function deleteCourse(clientId,idx){
  if(!isMaster){alert('チケットの削除は管理者のみ可能です');return}
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const cr=c.courses[idx];if(!cr)return;
  if(!confirm(cr.total+'回分のチケットを削除しますか？'))return;
  c.courses.splice(idx,1);
  save();
  openAddTicket(clientId);
}

function buildServiceRadios(selectedSvc){
  return Object.keys(SERVICES).map(svc=>{
    const cls=svcClass(svc);
    return `<div class="svc-radio ${cls} ${selectedSvc===svc?'active':''}" onclick="selectService('${svc}')">
      <div class="svc-radio-dot"></div>
      <div>${SERVICES[svc].label}</div>
    </div>`;
  }).join('');
}
let _modalSvc='aden',_modalSrc='ad',_modalPlan='basic',_modalStaffId=null;
function selectService(svc){
  _modalSvc=svc;
  refreshModalServiceUI();
}
function selectSource(src){
  _modalSrc=src;
  document.querySelectorAll('.source-radio[data-src]').forEach(r=>r.classList.toggle('active',r.dataset.src===src));
  refreshModalServiceUI();
}
function selectPlan(plan){
  _modalPlan=plan;
  document.querySelectorAll('.source-radio[data-plan]').forEach(r=>r.classList.toggle('active',r.dataset.plan===plan));
  // セッション料金のデフォルトを更新（ユーザーが手動編集してなければ）
  const inp=document.getElementById('mPrice')||document.getElementById('ePrice');
  if(inp&&!inp.dataset.userTouched){
    inp.value=plan==='lite'?12000:18000;
  }
}
function refreshModalServiceUI(){
  document.querySelectorAll('.svc-radio').forEach(r=>{
    r.classList.toggle('active',r.querySelector('div:last-child').textContent===SERVICES[_modalSvc].label);
  });
  const isRoom=_modalSvc==='aden'||_modalSvc==='sub-svc';
  const isSelfVar=(_modalSvc==='noic'||_modalSvc==='resync')&&_modalSrc==='self';
  const isAdNoicResync=(_modalSvc==='noic'||_modalSvc==='resync')&&_modalSrc==='ad';
  const isHybrid=isRoom||isSelfVar||isAdNoicResync;
  const hasSource=SERVICES[_modalSvc].hasSource;
  const hasPlan=SERVICES[_modalSvc].hasPlan;
  const sourceGroup=document.getElementById('mSourceGroup');
  if(sourceGroup)sourceGroup.classList.toggle('hidden',!hasSource);
  const planGroup=document.getElementById('mPlanGroup');
  if(planGroup)planGroup.classList.toggle('hidden',!hasPlan);
  const priceGroup=document.getElementById('mPriceGroup');
  const priceLabel=document.getElementById('mPriceLabel');
  if(priceGroup&&priceLabel){
    if(isHybrid){
      priceGroup.classList.remove('hidden');
      priceLabel.innerHTML=isSelfVar?'セッション料金（円）':isAdNoicResync?'セッション料金（円） <span style="font-size:11px;color:var(--text-light)">※コース単価のデフォルトとして使用</span>':'セッション料金（円）';
      const inp=document.getElementById('mPrice')||document.getElementById('ePrice');
      if(inp&&!inp.dataset.userTouched){
        if(hasPlan&&_modalPlan==='lite')inp.value=12000;
        else inp.value=SERVICES[_modalSvc].defaultPrice;
      }
    }else{
      priceGroup.classList.add('hidden');
    }
  }
}

function saveNewClient(){
  const name=document.getElementById('mName').value.trim();
  if(!name){alert('名前を入力してください');return}
  // 新規登録時はスタッフも全項目を設定可（登録後の編集は管理者のみ）
  const svc=_modalSvc;
  const src=SERVICES[svc].hasSource?_modalSrc:null;
  const isRoom=svc==='aden'||svc==='sub-svc';
  const isSelfVar=(svc==='noic'||svc==='resync')&&src==='self';
  const isAdNoicResync=(svc==='noic'||svc==='resync')&&src==='ad';
  const hasPriceInput=isRoom||isSelfVar||isAdNoicResync;
  // カスタムモード（管理者のみ・新規追加時）
  const customCb=document.getElementById('mCustomEnabled');
  const useCustom=isMaster&&customCb&&customCb.checked;
  let customSessionPrice=0,customReward=0,price;
  if(useCustom){
    customSessionPrice=parseInt(document.getElementById('mCustomPrice').value)||0;
    customReward=parseInt(document.getElementById('mCustomReward').value)||0;
    price=customSessionPrice;
  }else if(hasPriceInput){
    const inp=document.getElementById('mPrice');
    price=inp?(parseInt(inp.value)||SERVICES[svc].defaultPrice):SERVICES[svc].defaultPrice;
  }else{
    price=SERVICES[svc].defaultPrice;
  }
  const ticket=parseInt(document.getElementById('mTicket').value)||0;
  if(ticket<=0){alert('購入回数（チケット）を1回以上で入力してください');return}
  const planVal=SERVICES[svc].hasPlan?(_modalPlan||'basic'):'basic';
  const courses=[];
  courses.push({id:'tk_'+Date.now(),total:ticket,addedAt:Date.now(),unitPrice:price,plan:planVal});
  D.clients.push({
    id:'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
    name,
    service:svc,
    source:src,
    plan:planVal,
    sessionPrice:price,
    courses,
    staffId:_modalStaffId||currentStaffId,
    createdAt:Date.now(),
    customEnabled:useCustom,
    customSessionPrice:useCustom?customSessionPrice:0,
    customReward:useCustom?customReward:0
  });
  save();closeModal();render();
}

function deleteCourseInEdit(clientId,idx){
  if(!isMaster){alert('チケットの削除は管理者のみ可能です');return}
  const c=D.clients.find(x=>x.id===clientId);if(!c)return;
  const cr=c.courses[idx];if(!cr)return;
  if(!confirm(cr.total+'回分のチケットを削除しますか？'))return;
  c.courses.splice(idx,1);
